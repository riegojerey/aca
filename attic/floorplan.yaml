type: picture-elements
image: /local/floorplan/transparent.png?version=536F9633915DBD10D9D40F26DE21E6FF
elements:
  - type: conditional
    title: binary_sensor.attic_theatre_door_contact closed, Base
    conditions:
      - condition: state
        entity: binary_sensor.attic_theatre_door_contact
        state_not: 'on'
    elements:
      - type: image
        tap_action:
          action: none
        hold_action:
          action: none
        image: /local/floorplan/binary_sensor.attic_theatre_door_contact-closed/base.png?version=C2CF4CE0D0F01FB05A40E55D676322D6
        filter: none
        style:
          left: 50%
          top: 50%
          width: 100%
  - type: conditional
    title: binary_sensor.attic_theatre_door_contact closed, light.attic_lamp
    conditions:
      - condition: state
        entity: light.attic_lamp
        state: 'on'
      - condition: state
        entity: binary_sensor.attic_theatre_door_contact
        state_not: 'on'
    elements:
      - type: image
        tap_action:
          action: none
        hold_action:
          action: none
        image: /local/floorplan/binary_sensor.attic_theatre_door_contact-closed/light.attic_lamp.png?version=42E1ECAD282E4D1A624CE04BF70A0476
        filter: none
        style:
          left: 50%
          top: 50%
          width: 100%
          mix-blend-mode: lighten
  - type: conditional
    title: binary_sensor.attic_theatre_door_contact open, Base
